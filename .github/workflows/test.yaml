name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v9
        with:
          version: "0.11.21"
          python-version: "3.11.9"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Compile contracts
        run: uv run --locked vesting-escrow-compile

      - name: Run functional tests
        run: uv run --locked pytest tests/functional/ --gas-profile

      - name: Run property tests
        run: uv run --locked pytest tests/integration/
